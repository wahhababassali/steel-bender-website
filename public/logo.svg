<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="helmetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c"/>
      <stop offset="100%" style="stop-color:#c2410c"/>
    </linearGradient>
  </defs>
  
  <!-- Helmet Dome -->
  <path d="M15 65 Q15 25 50 25 Q85 25 85 65" fill="url(#helmetGrad)" stroke="#0a0a0a" stroke-width="2"/>
  
  <!-- Helmet Rim -->
  <rect x="12" y="62" width="76" height="12" rx="3" fill="url(#rimGrad)" stroke="#0a0a0a" stroke-width="2"/>
  
  <!-- Helmet Ridge -->
  <rect x="47" y="28" width="6" height="36" rx="1" fill="#0a0a0a" opacity="0.3"/>
  
  <!-- Highlight -->
  <path d="M25 40 Q35 32 50 32" fill="none" stroke="white" stroke-width="2" opacity="0.3" stroke-linecap="round"/>
  
  <!-- B Letter -->
  <text x="50" y="58" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="24" font-weight="900" fill="#0a0a0a">B</text>
